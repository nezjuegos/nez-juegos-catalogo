<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Juegos | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b; --bg-card: #18181b; --primary: #8b5cf6;
            --text-main: #f8fafc; --text-muted: #a1a1aa; --border: #27272a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding: 2rem; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        .header h1 { font-family: 'Outfit'; font-size: 2rem; }
        
        .btn { padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; text-decoration: none; display: inline-block; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #7c3aed; }
        .btn-back { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
        .btn-back:hover { background: #27272a; color: white; }

        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 2rem; }

        .form-section { background: var(--bg-card); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase; font-weight: 600; }
        input, select { width: 100%; background: #09090b; border: 1px solid var(--border); color: white; padding: 0.8rem; border-radius: 6px; }
        input:focus { outline: none; border-color: var(--primary); }
        
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        
        /* File Upload */
        .file-upload { border: 2px dashed var(--border); padding: 2rem; text-align: center; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 1rem; }
        .file-upload:hover { border-color: var(--primary); background: rgba(139, 92, 246, 0.05); }

        /* Table */
        .table-section { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #09090b; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .game-cell { display: flex; align-items: center; gap: 1rem; }
        .game-cell img { width: 80px; height: 45px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); }
        
        .action-btn { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; opacity: 0.7; transition: 0.2s; margin-right: 0.5rem; }
        .action-btn:hover { opacity: 1; transform: scale(1.1); }

        /* Responsive Layout */
        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
            .table-section { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .table-section table { min-width: 600px; }
            .header { flex-direction: column; gap: 1rem; align-items: flex-start; }
            body { padding: 1rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎮 Gestión de Juegos Individuales</h1>
        <a href="/admin" class="btn btn-back">Volver al Dashboard</a>
    </div>

    <div class="layout">
        <!-- Formulario (CRUD) -->
        <div class="form-section">
            <h2 id="formTitle" style="margin-bottom: 1.5rem; font-family: 'Outfit';">Agregar Nuevo Juego</h2>
            
            <input type="hidden" id="juegoId">

            <div class="form-group">
                <label>Título del Juego</label>
                <input type="text" id="titulo" placeholder="Ej: Mario Kart 8 Deluxe">
            </div>

            <div class="form-group">
                <label>Plataforma</label>
                <select id="plataforma">
                    <option>Nintendo Switch</option>
                    <option>Nintendo Switch 2</option>
                </select>
            </div>

            <div class="form-group">
                <label>Precios (ARS)</label>
                <div class="price-grid">
                    <input type="number" id="precio_codigo" placeholder="Código (Ej: 115000)">
                    <input type="number" id="precio_primaria" placeholder="Primaria (Ej: 85000)">
                    <input type="number" id="precio_secundaria" placeholder="Secundaria (Ej: 45000)">
                    <input type="number" id="precio_alquiler" placeholder="Alquiler (Ej: 18000)">
                </div>
            </div>

            <div class="form-group">
                <label>Portada (Horizontal 16:9)</label>
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
                <div class="file-upload" id="dropZone">
                    <div id="previewContainer" style="display: none; margin-bottom: 1rem;">
                        <img id="imagePreview" style="max-width: 100%; border-radius: 4px; border: 1px solid var(--border);">
                    </div>
                    <span id="uploadText">📁 Haz clic para subir imagen</span>
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 5px;">Se guardará localmente en el servidor</p>
                </div>
            </div>

            <button class="btn btn-primary" id="btnSave" style="width: 100%;">Guardar Juego en Base de Datos</button>
            <button class="btn btn-back" id="btnCancel" style="width: 100%; margin-top: 0.5rem; display: none;">Cancelar Edición</button>
        </div>

        <!-- Tabla -->
        <div class="table-section">
            <table id="gamesTable">
                <thead>
                    <tr>
                        <th>Juego</th>
                        <th>Plataforma</th>
                        <th>Precios Registrados</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Dinamico -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const tableBody = document.querySelector('#gamesTable tbody');
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const previewImg = document.getElementById('imagePreview');
        const previewContainer = document.getElementById('previewContainer');
        const uploadText = document.getElementById('uploadText');
        
        const btnSave = document.getElementById('btnSave');
        const btnCancel = document.getElementById('btnCancel');
        const formTitle = document.getElementById('formTitle');
        const juegoIdInput = document.getElementById('juegoId');

        // Form Fields
        const fields = ['titulo', 'plataforma', 'precio_codigo', 'precio_primaria', 'precio_secundaria', 'precio_alquiler'];

        let allGames = [];

        // --- Fetch & Render ---
        async function loadGames() {
            try {
                const res = await fetch('/api/juegos');
                const data = await res.json();
                allGames = data.results || [];
                renderTable();
            } catch (err) { console.error(err); }
        }

        function formatPrice(val) {
            return val ? '$' + val.toLocaleString('es-AR') : '-';
        }

        function renderTable() {
            tableBody.innerHTML = '';
            allGames.forEach(game => {
                const tr = document.createElement('tr');
                const cover = game.imagen_filename ? `/uploads/${game.imagen_filename}` : 'https://via.placeholder.com/160x90?text=S/I';
                
                tr.innerHTML = `
                    <td>
                        <div class="game-cell">
                            <img src="${cover}" alt="${game.titulo}">
                            <strong>${game.titulo}</strong>
                        </div>
                    </td>
                    <td><span style="background:#27272a; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem;">${game.plataforma}</span></td>
                    <td>
                        <div style="font-size: 0.85rem; color: var(--text-muted);">
                            Cód: ${formatPrice(game.precio_codigo)} | Pri: ${formatPrice(game.precio_primaria)}<br>
                            Sec: ${formatPrice(game.precio_secundaria)} | Alq: ${formatPrice(game.precio_alquiler)}
                        </div>
                    </td>
                    <td>
                        <button class="action-btn" onclick="editGame(${game.id})">✏️</button>
                        <button class="action-btn" onclick="deleteGame(${game.id})">🗑️</button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // --- File Handling ---
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = () => {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewContainer.style.display = 'block';
                    uploadText.innerText = "Imagen seleccionada: " + file.name;
                };
                reader.readAsDataURL(file);
            }
        };

        // --- CRUD Actions ---
        btnSave.onclick = async () => {
            const formData = new FormData();
            fields.forEach(f => formData.append(f, document.getElementById(f).value));
            
            if (fileInput.files[0]) {
                formData.append('image', fileInput.files[0]);
            }

            const id = juegoIdInput.value;
            const url = id ? `/api/admin/juegos/${id}` : '/api/admin/juegos';
            const method = id ? 'PUT' : 'POST';

            try {
                btnSave.disabled = true;
                btnSave.innerText = "Guardando...";
                
                // If it's a PUT but we are sending FormData, we need to handle it.
                // Flask PUT with FormData sometimes requires POST-shimming or just handling it in the route.
                // Our backend handles PUT with multipart/form-data now.
                const res = await fetch(url, {
                    method: method,
                    body: formData
                });
                
                const data = await res.json();
                if (data.status === 'ok') {
                    resetForm();
                    loadGames();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                console.error(err);
                alert('Fallo al guardar');
            } finally {
                btnSave.disabled = false;
                btnSave.innerText = "Guardar Juego en Base de Datos";
            }
        };

        window.editGame = (id) => {
            const game = allGames.find(g => g.id === id);
            if (!game) return;

            juegoIdInput.value = game.id;
            fields.forEach(f => {
                document.getElementById(f).value = game[f] || '';
            });

            formTitle.innerText = "Editando: " + game.titulo;
            btnSave.innerText = "Actualizar Juego";
            btnCancel.style.display = 'block';
            
            if (game.imagen_filename) {
                previewImg.src = `/uploads/${game.imagen_filename}`;
                previewContainer.style.display = 'block';
                uploadText.innerText = "Imagen actual: " + game.imagen_filename;
            } else {
                previewContainer.style.display = 'none';
                uploadText.innerText = "📁 Haz clic para subir imagen";
            }
            primaryScrollIntoView();
        };

        window.deleteGame = async (id) => {
            if (!confirm('¿Seguro que quieres eliminar este juego?')) return;
            try {
                const res = await fetch(`/api/admin/juegos/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.status === 'ok') loadGames();
            } catch (err) { console.error(err); }
        };

        btnCancel.onclick = resetForm;

        function resetForm() {
            juegoIdInput.value = '';
            fields.forEach(f => document.getElementById(f).value = '');
            fileInput.value = '';
            previewContainer.style.display = 'none';
            uploadText.innerText = "📁 Haz clic para subir imagen";
            formTitle.innerText = "Agregar Nuevo Juego";
            btnSave.innerText = "Guardar Juego en Base de Datos";
            btnCancel.style.display = 'none';
        }

        function primaryScrollIntoView() {
            document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth' });
        }

        loadGames();
    </script>
</body>
</html>
