<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Packs | Nez Juegos</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --bg-card: #131318;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --secondary: #d946ef;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #27272a;
            --whatsapp: #25d366;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-dark); color: var(--text-main);
            background-image: radial-gradient(circle at 100% 0%, rgba(139, 92, 246, 0.1) 0%, transparent 40%);
            background-attachment: fixed; min-height: 100vh;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
        a { text-decoration: none; color: inherit; }

        /* Navbar */
        header {
            position: sticky; top: 0; background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border); z-index: 1000; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-family: 'Outfit'; font-weight: 800; font-size: 1.5rem; display: flex; align-items: center; gap: 8px; }
        .logo span { background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { font-weight: 500; color: var(--text-muted); transition: 0.3s; }
        .nav-links a:hover, a.active { color: white; }

        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }

        /* Search & Filters */
        .filters-section {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 2rem; margin-bottom: 3rem; display: flex; flex-wrap: wrap; gap: 1rem; align-items: center;
        }
        
        .search-box { flex: 1; min-width: 200px; position: relative; }
        .search-box input {
            width: 100%; background: #0a0a0c; border: 1px solid var(--border); color: white;
            padding: 1rem 1rem 1rem 3rem; border-radius: var(--radius-sm); font-size: 1rem;
        }
        .search-box input:focus { outline: none; border-color: var(--primary); }
        .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .price-filter input { width: 120px; background: #0a0a0c; border: 1px solid var(--border); color: white; padding: 1rem; border-radius: var(--radius-sm); }
        
        .dlc-toggle {
            display: flex; align-items: center; gap: 0.5rem; background: #0a0a0c; border: 1px solid var(--border);
            padding: 0 1rem; height: 50px; border-radius: var(--radius-sm); cursor: pointer; user-select: none;
        }
        .dlc-toggle input { width: 18px; height: 18px; accent-color: var(--secondary); cursor: pointer; }

        /* Grid */
        .packs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }

        /* Pack Card */
        .pack-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md);
            overflow: hidden; display: flex; flex-direction: column; transition: 0.3s;
        }
        .pack-card:hover { transform: translateY(-5px); border-color: rgba(139, 92, 246, 0.4); box-shadow: 0 10px 30px -10px rgba(139, 92, 246, 0.2); }
        
        .pack-cover { height: 120px; background: #27272a; position: relative; overflow: hidden; }
        .dlc-badge {
            position: absolute; top: 1rem; right: 1rem; background: var(--secondary); color: white;
            padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
        }

        .pack-content { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
        .pack-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .pack-id { color: var(--text-muted); font-size: 0.85rem; font-family: monospace; }
        .pack-price { font-size: 1.5rem; font-family: 'Outfit'; font-weight: 800; color: white; }
        
        .pack-games { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem; flex: 1; }
        .game-title { color: white; display: flex; align-items: center; gap: 0.5rem; }
        .game-title.dlc-solo { color: var(--secondary); }
        .game-title.dlc-mixed { color: #60a5fa; }

        .pack-actions { display: flex; gap: 0.5rem; }
        .btn { flex: 1; padding: 0.8rem; border-radius: var(--radius-sm); font-weight: 600; text-align: center; cursor: pointer; transition: 0.2s; border: none; font-size: 0.9rem; }
        .btn-wa { background: var(--whatsapp); color: white; }
        .btn-wa:hover { background: var(--whatsapp-hover); }
        .btn-copy { background: #27272a; color: white; }
        .btn-copy:hover { background: #3f3f46; }

        /* Responsive */
        @media (max-width: 768px) {
            header { padding: 0.8rem 1rem; }
            .logo { font-size: 1.2rem; }
            .nav-links { gap: 1rem; font-size: 0.85rem; }
            .container { padding: 1.5rem 1rem; }
            .container > h1 { font-size: 1.6rem; }
            .filters-section { padding: 1rem; gap: 0.75rem; flex-direction: column; border-radius: var(--radius-md); margin-bottom: 1.5rem; }
            .search-box { min-width: 100%; }
            .search-box input { padding: 0.8rem 0.8rem 0.8rem 2.5rem; font-size: 0.9rem; }
            .search-icon { left: 0.8rem; }
            .price-filter input { width: 100%; }
            .dlc-toggle { width: 100%; justify-content: center; }
            .filters-section .btn { width: 100%; height: 52px; font-size: 1rem; }
            .packs-legend { font-size: 0.75rem; gap: 0.75rem !important; }
            .packs-grid { grid-template-columns: 1fr; gap: 1rem; }
            .pack-cover { height: 80px; }
            .pack-content { padding: 1rem; }
            .pack-price { font-size: 1.3rem; }
            .pack-games { font-size: 0.85rem; line-height: 1.5; margin-bottom: 1rem; }
            .game-title { font-size: 0.85rem; }
            .pack-actions .btn { padding: 0.7rem; font-size: 0.85rem; }
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">
            <a href="/">🎮 <span>Nez</span> Juegos</a>
        </div>
        <nav class="nav-links">
            <a href="/juegos">Juegos Individuales</a>
            <a href="/packs" class="active">Packs en Oferta</a>
        </nav>
    </header>

    <div class="container">
        <h1>📦 Catálogo de packs</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Los mejores combos de juegos armados a precios insuperables.</p>

        <div class="filters-section">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar juego en un pack... (ej: Zelda)">
            </div>
            <div class="price-filter">
                <input type="number" id="maxPrice" placeholder="Precio Max ($)">
            </div>
            <label class="dlc-toggle">
                <input type="checkbox" id="dlcOnly">
                <span>Mostrar solo DLCs</span>
            </label>
            <button class="btn" id="btnBuscar" style="background: var(--primary); color: white; padding: 0 2rem; height: 50px;">Buscar</button>
            <button class="btn" id="btnLimpiar" style="background: #27272a; color: var(--text-muted); padding: 0 1.5rem; height: 50px; border: 1px solid var(--border);">Limpiar</button>
        </div>

        <div class="packs-legend" style="display: flex; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; font-size: 0.85rem; color: var(--text-muted);">
            <span>🎮 Juego completo</span>
            <span><span style="background: var(--secondary); color: white; padding: 2px 8px; border-radius: 50px; font-size: 0.7rem; font-weight: 700;">SOLO DLC</span> = Contenido descargable sin juego</span>
            <span><span style="background: #3b82f6; color: white; padding: 2px 8px; border-radius: 50px; font-size: 0.7rem; font-weight: 700;">JUEGO + DLC</span> = Juego completo + DLC</span>
        </div>

        <div id="featuredSection" style="display: none; margin-bottom: 4rem;">
            <h2 style="font-family: 'Outfit'; font-size: 1.8rem; margin-bottom: 1.5rem; color: #eab308; display: flex; align-items: center; gap: 0.5rem;">
                ⭐ Packs Destacados
            </h2>
            <div class="packs-grid" id="featuredGrid">
                <!-- Rendered via JS -->
            </div>
            <div style="width: 100%; height: 1px; background: var(--border); margin-top: 3rem;"></div>
        </div>

        <h2 style="font-family: 'Outfit'; font-size: 1.5rem; margin-bottom: 1.5rem; color: white;">Catálogo Completo</h2>
        <div class="packs-grid" id="packsGrid">
            <!-- Rendered via JS -->
        </div>
    </div>

    <script>
        const packsGrid = document.getElementById('packsGrid');
        const searchInput = document.getElementById('searchInput');
        const maxPriceInput = document.getElementById('maxPrice');
        const dlcToggle = document.getElementById('dlcOnly');
        const searchBtn = document.getElementById('btnBuscar');
        const clearBtn = document.getElementById('btnLimpiar');

        let waNumber = '';  // loaded from config
        let hotTitlesList = []; // loaded from public API

        // Create autocomplete suggestions container
        const suggestionsBox = document.createElement('div');
        suggestionsBox.className = 'suggestions-box';
        suggestionsBox.style.cssText = 'position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-card); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius-sm) var(--radius-sm); z-index: 100; display: none; max-height: 200px; overflow-y: auto;';
        searchInput.parentNode.appendChild(suggestionsBox);

        // Helper functions
        const isTitleHot = (name) => {
            if (!name) return false;
            const nameLower = name.toLowerCase();
            return hotTitlesList.some(hot => nameLower.includes(hot.toLowerCase()));
        };

        const isLineMixed = g => g.is_mixed === true || (g.name && g.name.includes('+') && g.is_dlc === true);
        const isLineStrictDlc = g => g.is_dlc && !isLineMixed(g);

        function formatPrice(p) { return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 }).format(p); }

        function generateText(pack) {
            let text = `📦 *Pack #${pack.id}*\n\n`;
            if (pack.games) {
                pack.games.forEach(g => {
                    const nameStr = g.name || 'Juego Desconocido';
                    const prefix = isTitleHot(nameStr) ? '🔥 ' : '';
                    if (isLineStrictDlc(g)) {
                        text += `🧩 ${prefix}${nameStr} (Solo DLC)\n`;
                    } else if (isLineMixed(g)) {
                        text += `🎮 ${prefix}${nameStr} (Juego + DLC)\n`;
                    } else {
                        text += `🎮 ${prefix}${nameStr}\n`;
                    }
                });
            }
            text += `\n💰 *Precio:* ${formatPrice(pack.price_local)}\n`;
            return text;
        }

        function wappLink(pack) {
            const text = encodeURIComponent(`Hola, quiero el ${generateText(pack)}`);
            return `https://wa.me/${waNumber}?text=${text}`;
        }
        
        window.copyToClip = function(pack) {
            const text = generateText(pack);
            navigator.clipboard.writeText(text).then(() => {
                alert('¡Copiado al portapapeles!');
            }).catch(err => console.error('Error copying text:', err));
        }

        // Fetch Packs API
        async function fetchPacks() {
            packsGrid.innerHTML = '<p style="color: var(--text-muted); text-align: center; width: 100%; padding: 3rem;">Cargando catálogo...</p>';
            
            const q = searchInput.value.trim();
            const priceMax = maxPriceInput.value;
            const dlcOnly = dlcToggle.checked;
            
            let url = `/api/packs?q=${encodeURIComponent(q)}`;
            if (priceMax) url += `&price_max=${priceMax}`;
            if (dlcOnly) url += `&dlc_only=true`;

            try {
                // Fetch regular results
                const res = await fetch(url);
                const data = await res.json();
                
                // Fetch featured results only if no search criteria is active
                let featuredData = { results: [] };
                const featuredSection = document.getElementById('featuredSection');
                
                if (!q && !priceMax && !dlcOnly) {
                    const featRes = await fetch(`/api/packs?featured=true`);
                    featuredData = await featRes.json();
                    
                    if (featuredData.results && featuredData.results.length > 0) {
                        featuredSection.style.display = 'block';
                        renderFeatured(featuredData.results);
                    } else {
                        featuredSection.style.display = 'none';
                    }
                } else {
                    featuredSection.style.display = 'none';
                }

                renderPacks(data.results || []);
            } catch (err) {
                console.error(err);
                packsGrid.innerHTML = '<p style="color: red; text-align: center; width: 100%;">Error cargando los packs.</p>';
            }
        }

        function createPackCard(pack, isFeaturedFlag = false) {
            const isLineStrictGame = g => !g.is_dlc && !isLineMixed(g);

            const allDlc = pack.games && pack.games.length > 0 && pack.games.every(isLineStrictDlc);
            const hasDlc = pack.games && pack.games.some(g => isLineStrictDlc(g) || isLineMixed(g));
            const hasGame = pack.games && pack.games.some(g => isLineStrictGame(g) || isLineMixed(g));
            
            const isPackMixed = hasDlc && hasGame;
            const isScraperNew = pack.is_new === 1;
            
            let gamesHtml = '';
            
            if (pack.games) {
                pack.games.forEach(g => {
                    const nameStr = g.name || 'Juego Desconocido';
                    const prefix = isTitleHot(nameStr) ? '🔥 ' : '';
                    if (isLineStrictDlc(g)) {
                        gamesHtml += `<div class="game-title dlc-solo">${prefix}🧩 ${nameStr}</div>`;
                    } else if (isLineMixed(g)) {
                        gamesHtml += `<div class="game-title dlc-mixed">${prefix}🎮 ${nameStr}</div>`;
                    } else {
                        gamesHtml += `<div class="game-title">${prefix}🎮 ${nameStr}</div>`;
                    }
                });
            }

            let badgeHtml = '';
            if (allDlc) {
                badgeHtml = '<span class="dlc-badge" style="background:var(--secondary);">Solo DLC</span>';
            } else if (isPackMixed) {
                badgeHtml = '<span class="dlc-badge" style="background:#3b82f6;">Juego + DLC</span>';
            }

            const newBadge = isScraperNew ? '<span class="dlc-badge" style="left:1rem; right:auto; background:#ef4444;">🔥 Nuevo</span>' : '';

            const cardStyle = isFeaturedFlag ? 'border-color: rgba(234, 179, 8, 0.4); box-shadow: 0 5px 20px rgba(234, 179, 8, 0.1);' 
                            : (isScraperNew ? 'border-color: rgba(239, 68, 68, 0.4); box-shadow: 0 5px 20px rgba(239, 68, 68, 0.1);' : '');

            let coverHtml = '';
            if (pack.manual_image_url) {
                coverHtml = `
                    <div class="pack-cover" style="background: url('${pack.manual_image_url}') center/cover; position: relative; height: 160px;">
                        ${badgeHtml}
                        ${newBadge}
                    </div>
                `;
            } else {
                coverHtml = `
                    <div class="pack-cover" style="background: linear-gradient(135deg, #1e1b4b, #312e81); display: flex; align-items: center; justify-content: center; font-size: 3rem; position: relative;">
                        📦
                        ${badgeHtml}
                        ${newBadge}
                    </div>
                `;
            }

            const card = document.createElement('div');
            card.className = 'pack-card';
            card.style.cssText = cardStyle;
            
            card.innerHTML = `
                ${coverHtml}
                <div class="pack-content">
                    <div class="pack-header">
                        <span class="pack-id">ID: ${pack.id}</span>
                        <span class="pack-price">${formatPrice(pack.price_local)}</span>
                    </div>
                    <div class="pack-games">
                        ${gamesHtml}
                    </div>
                    <div class="pack-actions">
                        <button class="btn btn-copy" onclick="copyToClip(${JSON.stringify(pack).replace(/"/g, '&quot;')})">Copiar</button>
                        <a href="${wappLink(pack)}" target="_blank" class="btn btn-wa"><svg style="width:16px;height:16px;vertical-align:middle;margin-right:4px" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 00.611.611l4.458-1.495A11.952 11.952 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.3 0-4.438-.766-6.145-2.058l-.43-.324-2.655.89.89-2.655-.324-.43A9.96 9.96 0 012 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>Pedir</a>
                    </div>
                </div>
            `;
            return card;
        }

        function renderFeatured(packs) {
            const grid = document.getElementById('featuredGrid');
            grid.innerHTML = '';
            packs.forEach(pack => {
                grid.appendChild(createPackCard(pack, true));
            });
        }

        function renderPacks(packs) {
            packsGrid.innerHTML = '';
            
            if (packs.length === 0) {
                packsGrid.innerHTML = '<p style="color: var(--text-muted); text-align: center; width: 100%; padding: 3rem;">No se encontraron packs con esos filtros.</p>';
                return;
            }
            
            packs.forEach(pack => {
                packsGrid.appendChild(createPackCard(pack, false));
            });
        }

        // Initial Load
        Promise.all([
            fetch('/api/config').then(r => r.json()),
            fetch('/api/public/hot_titles').then(r => r.json())
        ]).then(([cfg, hotTitles]) => {
            waNumber = cfg.numero_whatsapp || '';
            hotTitlesList = hotTitles || [];
            fetchPacks();
        }).catch(() => {
            fetchPacks();
        });
    </script>
</body>
</html>
